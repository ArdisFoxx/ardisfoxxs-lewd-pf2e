# AFLP 5.x Lovense Integration — default GIFT event config
# ---------------------------------------------------------------
# This file is the default template. The in-game Setup Wizard
# (AFLP sheet tab → heart button) generates a personalised version
# pre-filled with your character name and intensity preferences.
# Use the wizard — don't edit this file manually.
# ---------------------------------------------------------------
# Place in: GIFT\data\events\games\ardisfoxxslewdpf2e\aflp.yaml

# ── Arousal tier events ──────────────────────────────────────────
- Arousal (Low):
    regex: .+{GIFT_ACTOR_NAME}, AFLP Arousal Low+
    function: generic_random_vibrate
    toy_class: vibrator
    params:
        min_duration: 1
        max_duration: 2
        min_strength: 15
        max_strength: 30

